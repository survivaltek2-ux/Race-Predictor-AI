services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-equineai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-equineai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-equineai}"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:${PORT:-8080}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: ${PORT:-8080}
      DATABASE_URL: postgresql://${POSTGRES_USER:-equineai}:${POSTGRES_PASSWORD:-changeme}@db:5432/${POSTGRES_DB:-equineai}
      ODDS_API_KEY: ${ODDS_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

volumes:
  pgdata:
