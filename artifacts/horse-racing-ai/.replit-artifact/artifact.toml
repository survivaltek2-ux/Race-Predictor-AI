kind = "web"
previewPath = "/"
title = "Horse Racing AI Predictor"
version = "1.0.0"
id = "artifacts/horse-racing-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20601
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/horse-racing-ai run dev"

[services.env]
PORT = "20601"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/horse-racing-ai", "run", "build"]
publicDir = "artifacts/horse-racing-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
